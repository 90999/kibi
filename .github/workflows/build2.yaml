name: Build Kibi Release

# 只允许手动执行
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows 64位 MSVC
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: win64-msvc
            ext: .exe

          # Windows 64位 GNU
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            name: win64-gnu
            ext: .exe

          # Windows 32位 MSVC
          - os: windows-latest
            target: i686-pc-windows-msvc
            name: win32-msvc
            ext: .exe

          # Linux 64位 GNU
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux64-gnu
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libspeechd-dev libxkbcommon-dev libssl-dev

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kibi-${{ matrix.name }}
          path: target/${{ matrix.target }}/release/kibi${{ matrix.ext }}
